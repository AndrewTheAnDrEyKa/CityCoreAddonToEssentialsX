config-version: 9
database:
  file: citycore.db
  pool-size: 4
economy:
  currency-scale: 2
  emission-enabled: true
  emission-max-amount: "1000000.00"
citizenship:
  reapply-cooldown-seconds: 86400
communication:
  local-chat:
    enabled: true
    speech-radius: 10.0
    shout-radius: 20.0
    shout-prefix: "!"
  phone:
    enabled: true
    call-timeout-seconds: 30
    call-cooldown-seconds: 4
  radio:
    enabled: true
    default-channel: "100.0"
    channels:
      - "100.0"
      - "100.2"
      - "100.4"
      - "100.6"
      - "100.8"
      - "101.0"
      - "101.2"
      - "101.4"
      - "101.6"
      - "101.8"
      - "102.0"
      - "102.2"
  devices:
    # Стартовые устройства выдаются автоматически и восстанавливаются после респауна.
    issue-starter-phone: true
    issue-starter-radio: true
  sounds:
    volume: 0.18
    ringtone: "BLOCK_NOTE_BLOCK_BELL"
    call-connected: "BLOCK_AMETHYST_BLOCK_CHIME"
    call-ended: "BLOCK_NOTE_BLOCK_HAT"
    radio-transmit: "BLOCK_NOTE_BLOCK_BIT"
industry:
  enabled: true
  cycle-seconds: 3600
  max-catch-up-periods: 3
  default-lease: "20.00"
  debt-suspend-threshold: "1000.00"
  controller-material: "LODESTONE"
  automatic-deposit:
    radius: 25
    reserves:
      1: 15000
      2: 15000
      3: 25000
  levels:
    1:
      units-per-cycle: 10
      price-per-unit: "25.00"
      maintenance: "40.00"
      minimum-license-days: 7
    2:
      units-per-cycle: 25
      price-per-unit: "25.00"
      maintenance: "120.00"
      minimum-license-days: 30
    3:
      units-per-cycle: 60
      price-per-unit: "25.00"
      maintenance: "360.00"
      minimum-license-days: 90
security:
  warn-offline-mode: true
gui:
  title: "CityCore"
  rows: 6
  sounds: true
  sound-volume: 0.14
  sound-open: true
  sound-click: true
  sound-results: true
  sound-open-effect: "BLOCK_AMETHYST_BLOCK_CHIME"
  sound-click-effect: "UI_BUTTON_CLICK"
  sound-success-effect: "ENTITY_EXPERIENCE_ORB_PICKUP"
  sound-failure-effect: "BLOCK_NOTE_BLOCK_BASS"
  sound-prompt-effect: "BLOCK_NOTE_BLOCK_HAT"
  # Цветные смысловые головы без обязательного ресурспака.
  custom-heads: true
integrations:
  luckperms:
    enabled: true
    groups:
      default: "citycore_default"
      citizen: "citycore_default"
      official: "citycore_official"
      mayor: "citycore_mayor"
      police: "citycore_police"
