name: CityCore
version: '${version}'
main: ru.citycore.CityCorePlugin
api-version: '1.21'
authors: [CityCore Team]
description: City-state economy and governance core
depend: [Vault, Essentials]
softdepend: [LuckPerms]
commands:
  citycore:
    aliases: [cc]
    description: Открыть CityCore
    usage: /citycore [help|status|reload]
  citycoreadmin:
    aliases: [cca]
    description: Открыть административный раздел CityCore
    usage: /cca
  citycoremayor:
    aliases: [ccm]
    description: Открыть рабочий раздел мэрии
    usage: /ccm
  citycoregovernment:
    aliases: [ccg]
    description: Открыть рабочий раздел государственных структур
    usage: /ccg
  profile:
    aliases: [pf]
    description: Открыть личный профиль CityCore
    usage: /profile
    permission: citycore.use
  city:
    aliases: [ct]
    description: Открыть городской раздел CityCore
    usage: /city
    permission: citycore.use
  business:
    aliases: [bz]
    description: Открыть предприятия CityCore
    usage: /business
    permission: citycore.use
  phone:
    aliases: [ph]
    description: Открыть телефон или позвонить игроку
    usage: /phone [call <игрок>|accept|decline|hangup|number]
    permission: citycore.phone
  phoneaccept:
    aliases: [pha]
    description: Принять входящий телефонный звонок
    usage: /pha
    permission: citycore.phone
  phonedecline:
    aliases: [phd]
    description: Отклонить входящий телефонный звонок
    usage: /phd
    permission: citycore.phone
  phonehangup:
    aliases: [phh]
    description: Завершить телефонный звонок
    usage: /phh
    permission: citycore.phone
  radio:
    aliases: [ra]
    description: Включить рацию или открыть её команды
    usage: /radio [set <канал>|list|status|off|send <текст>]
    permission: citycore.radio
  radiofrequency:
    aliases: [rf, radioset]
    description: Показать или изменить канал рации
    usage: /rf [канал]
    permission: citycore.radio
  radiotransmit:
    aliases: [rc]
    description: Передать одно сообщение в радиоэфир
    usage: /rc <сообщение>
    permission: citycore.radio
permissions:
  citycore.use:
    default: true
  citycore.admin:
    default: op
    children:
      citycore.admin.status: true
      citycore.admin.reload: true
      citycore.admin.cities: true
      citycore.admin.emission: true
      citycore.admin.industry: true
      citycore.admin.events: true
  citycore.admin.status:
    default: op
  citycore.admin.reload:
    default: op
  citycore.admin.cities:
    default: op
  citycore.admin.emission:
    default: op
  citycore.admin.industry:
    default: op
  citycore.admin.events:
    default: op
  citycore.communication:
    default: true
    children:
      citycore.phone: true
      citycore.radio: true
  citycore.phone:
    default: true
  citycore.radio:
    default: true
